<style>
.mode-landscape .sl-layout { flex-direction: row; }
.mode-portrait .sl-layout { flex-direction: column; }
.mode-landscape .sl-content { width: 55%; }
.mode-portrait .sl-content { width: 100%; }
.mode-landscape .sl-visual { width: 45%; }
.mode-portrait .sl-visual { width: 100%; height: 30%; }
</style>
<section class="w-full h-full overflow-auto bg-white">
  <div class="sl-layout flex h-full">

    <!-- Content Column -->
    <div class="sl-content flex flex-col justify-between p-12">
      <div>
        <div class="w-10 h-1 mb-10 rounded-full" style="background-color: {{config.theme.accentColor}};"></div>
        <p class="text-xs font-bold uppercase tracking-widest mb-4" style="color: {{config.theme.accentColor}}; font-family: {{config.theme.fontFamily}};">Personal Landing Page</p>
        <h1 class="text-7xl font-black tracking-tight leading-none mb-6" style="color: {{config.theme.primaryColor}}; font-family: {{config.theme.fontFamily}};">
          {{config.hero.headline}}
        </h1>
        <p class="text-xl font-light tracking-widest uppercase" style="color: {{config.theme.secondaryColor}}; font-family: {{config.theme.fontFamily}}; opacity: 0.6;">
          {{config.tagline}}
        </p>
      </div>
      <div>
        <p class="text-sm mb-6 leading-relaxed" style="color: {{config.theme.secondaryColor}}; font-family: {{config.theme.fontFamily}}; opacity: 0.55; max-width: 320px;">
          {{config.description}}
        </p>
        <data-attribution />
      </div>
    </div>

    <!-- Visual Column -->
    <div class="sl-visual relative overflow-hidden" style="background-color: {{config.theme.primaryColor}};">
      <img
        src="http://localhost:8001/common/image-generation?prompt=minimal%20abstract%20geometric%20shapes%20dark%20navy%20editorial%20personal%20brand%20clean%20modern"
        alt="Cover visual"
        class="w-full h-full object-cover"
        style="opacity: 0.45;"
      />
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="font-black" style="font-size: 14rem; color: white; opacity: 0.06; font-family: {{config.theme.fontFamily}}; line-height: 1;">O</span>
      </div>
      <div class="absolute bottom-10 left-10">
        <div class="w-8 h-8 rounded-full" style="background-color: {{config.theme.accentColor}};"></div>
      </div>
    </div>

  </div>
</section>
